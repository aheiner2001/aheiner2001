<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1F3A5F;
      --navy-light: #2a4f80;
      --accent: #448AFF;
      --accent-soft: #d6e6ff;
      --slate: #6B7A8F;
      --bg: #F4F7FB;
      --white: #ffffff;
      --card-shadow: 0 4px 24px rgba(31,58,95,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(31,58,95,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31,58,95,0.035) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    header {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: var(--navy);
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(31,58,95,0.22);
    }

    .logo-mark svg {
      width: 28px;
      height: 28px;
      fill: var(--white);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      color: var(--navy);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .tagline {
      font-size: 0.82rem;
      color: var(--slate);
      font-weight: 400;
      margin-top: 5px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    /* Cards */
    a.card {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      background: var(--white);
      border: 1.5px solid rgba(31,58,95,0.09);
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      box-shadow: var(--card-shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    a.card:hover, a.card:active {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(31,58,95,0.16);
      border-color: var(--accent);
    }

    .icon-wrap {
      flex-shrink: 0;
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
    }

    .icon-wrap.blue   { background: #dbeafe; }
    .icon-wrap.green  { background: #dcfce7; }
    .icon-wrap.orange { background: #fef3c7; }

    .card-text {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.97rem;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--slate);
      margin-top: 2px;
      font-weight: 400;
    }

    .arrow {
      flex-shrink: 0;
      color: var(--accent);
      font-size: 1.1rem;
      opacity: 0.7;
      transition: opacity 0.18s, transform 0.18s;
    }

    a.card:hover .arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    footer {
      margin-top: 18px;
      font-size: 0.72rem;
      color: #b0bcc8;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* stagger animation */
    .card { opacity: 0; animation: fadeUp 0.4s ease forwards; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.13s; }
    .card:nth-child(3) { animation-delay: 0.21s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo-mark">
        <!-- sparkle / window icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L14.4 9.6H22L15.8 14.4L18.2 22L12 17.2L5.8 22L8.2 14.4L2 9.6H9.6L12 2Z"/>
        </svg>
      </div>
      <h1>My Apps</h1>
      <p class="tagline">Quick Launch</p>
      <div class="divider"></div>
    </header>

    <a class="card" href="https://hgsmqgsahhnwkkc3xvgjwo.streamlit.app/" target="_blank" rel="noopener">
      <div class="icon-wrap blue">🪟</div>
      <div class="card-text">
        <div class="card-name">My-T-Brite Service Report</div>
        <div class="card-desc">Generate & download job PDFs</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="card" href="https://2btqhcf6tq54jyafhtuvw7.streamlit.app/" target="_blank" rel="noopener">
      <div class="icon-wrap green">🎮</div>
      <div class="card-text">
        <div class="card-name">Dixit Pro</div>
        <div class="card-desc">Open Dixit Pro app</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="card" href="https://mfhtcypiaeabe8qej8nnm6.streamlit.app/" target="_blank" rel="noopener">
      <div class="icon-wrap orange">⏱️</div>
      <div class="card-text">
        <div class="card-name">Fasting Tracker</div>
        <div class="card-desc">Track your fasting progress</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <footer>Aaron · My-T-Brite</footer>

  </div>
</body>
</html>
